<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9333ff"/>
      <stop offset="1" stop-color="#47bfff"/>
    </linearGradient>
  </defs>

  <rect width="48" height="48" rx="13" fill="url(#bg)"/>

  <!-- flower + leaves, where the cat is stepping from -->
  <g transform="translate(10,33)">
    <path d="M-1 2c-2.6.6-4 2.4-4.4 4.4 2 .3 3.8-.4 4.9-2.1" fill="#22c55e"/>
    <path d="M1.5 2.6c1.8 1.8 4.1 2 6 1.1-.9-2-2.7-3.2-4.8-3.2" fill="#22c55e"/>
    <g fill="#ff8fd6">
      <circle cx="0" cy="-4.2" r="2.1"/>
      <circle cx="3.6" cy="-1.7" r="2.1"/>
      <circle cx="2.2" cy="2.9" r="2.1"/>
      <circle cx="-2.2" cy="2.9" r="2.1"/>
      <circle cx="-3.6" cy="-1.7" r="2.1"/>
    </g>
    <circle cx="0" cy="0" r="1.9" fill="#ffd23f"/>
  </g>

  <!-- tail, curled up behind the body -->
  <path d="M30 33.5c6.6.3 8.9-5.6 6.6-10.1-1.6-3.1-5.5-3.9-6.8-1" fill="none" stroke="#ffb156" stroke-width="4" stroke-linecap="round"/>

  <!-- back leg, planted -->
  <rect x="16" y="35" width="4.4" height="6.5" rx="2.2" fill="#ffb156"/>
  <!-- front leg, lifted mid-step -->
  <rect x="26.5" y="33" width="4.4" height="8" rx="2.2" fill="#ffb156" transform="rotate(-22 28.7 37)"/>

  <!-- body -->
  <ellipse cx="24.5" cy="31" rx="11.5" ry="8.2" fill="#ffb156"/>
  <path d="M17.5 27.5c1.7-1.3 3.4-1.3 5.1 0M16.7 31.2c1.9-1.4 3.8-1.4 5.7 0" stroke="#f2984a" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- head -->
  <circle cx="33.5" cy="20.5" r="8.6" fill="#ffb156"/>
  <path d="M27.8 15 25.3 9 31.9 13.2Z" fill="#ffb156"/>
  <path d="M39 15 41.5 9 35 13.2Z" fill="#ffb156"/>
  <path d="M28.9 14.5 27.3 11 30.7 12.9Z" fill="#ffd8ac"/>
  <path d="M37.9 14.5 39.5 11 36.1 12.9Z" fill="#ffd8ac"/>

  <ellipse cx="33.5" cy="24.2" rx="4.4" ry="3.1" fill="#fff1dc"/>
  <circle cx="30.3" cy="19.3" r="1" fill="#3a2418"/>
  <circle cx="36.7" cy="19.3" r="1" fill="#3a2418"/>
  <path d="M34.2 21.6 33.5 20.4 32.8 21.6Z" fill="#ff8fa3"/>
  <path d="M32.25 22.6c.7.9 1.8.9 2.5 0" stroke="#3a2418" stroke-width=".9" fill="none" stroke-linecap="round"/>
</svg>
